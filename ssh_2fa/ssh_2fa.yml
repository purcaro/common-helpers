---
- name: Deploy SSH 2FA with Password + TOTP Support and Internal Bypass
  hosts: all
  become: yes
  vars:
    # Space-separated for PAM access file
    pam_internal_subnets: "192.168.1.0/24 127.0.0.1"
    # Comma-separated for OpenSSH sshd_config
    ssh_internal_subnets: "192.168.1.0/24,127.0.0.1"
    
    # User whitelist (space-separated list of allowed usernames)
    allowed_ssh_users: "mjp"
    
    # Set to 'no' now that you have generated your 'google-authenticator' token.
    allow_missing_totp: no

  tasks:
    - name: Install Google Authenticator PAM module
      ansible.builtin.apt:
        name: libpam-google-authenticator
        state: present
        update_cache: yes

    - name: Create PAM access file for internal IP bypass
      ansible.builtin.copy:
        dest: /etc/security/access-ssh-totp.conf
        content: |
          + : ALL : {{ pam_internal_subnets }}
          - : ALL : ALL
        owner: root
        group: root
        mode: '0644'

    - name: Instruct PAM to skip Google Authenticator for internal IPs
      ansible.builtin.lineinfile:
        path: /etc/pam.d/sshd
        insertbefore: '^auth\s+(required|requisite)\s+pam_google_authenticator\.so'
        line: 'auth [success=1 default=ignore] pam_access.so accessfile=/etc/security/access-ssh-totp.conf'
        state: present

    - name: Configure PAM to use Google Authenticator (with optional nullok)
      ansible.builtin.lineinfile:
        path: /etc/pam.d/sshd
        regexp: '^auth required pam_google_authenticator\.so'
        line: "auth required pam_google_authenticator.so{{ ' nullok' if allow_missing_totp else '' }}"
        state: present

    - name: Enable Keyboard Interactive Authentication globally
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KbdInteractiveAuthentication'
        line: 'KbdInteractiveAuthentication yes'
        state: present

    - name: Ensure UsePAM is enabled globally
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UsePAM'
        line: 'UsePAM yes'
        state: present

    - name: Enforce Global User Whitelist (External)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AllowUsers'
        line: "AllowUsers {{ allowed_ssh_users }}"
        state: present

    - name: Enforce Keyboard Interactive globally (External - Password + TOTP)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AuthenticationMethods'
        line: 'AuthenticationMethods keyboard-interactive'
        state: present

    - name: Add Match Address block for internal network (Internal Bypass)
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Internal SSH Bypass"
        # Match blocks must ALWAYS sit at the very bottom of the sshd_config file
        insertafter: EOF
        block: |
          Match Address {{ ssh_internal_subnets }}
              AllowUsers {{ allowed_ssh_users }}
              # For internal network: allow standard SSH keys OR plain password without 2FA
              AuthenticationMethods publickey password keyboard-interactive
              PasswordAuthentication yes
              KbdInteractiveAuthentication yes
        validate: /usr/sbin/sshd -t -f %s
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted
